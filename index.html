<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>iKnowASpot</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <!--
    CSS is still inline for now (Stage 1 of the refactor).
    Stage 5 (future) will extract these into /css/*.css files.
    The visual output is identical to the original.
  -->
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --ink: #050810;
      --sage: #7a9e8e;
      --mist: #c8d8c0;
      --cream: #e8e4d4;
      --glow: rgba(120, 180, 140, 0.6);
      --font-display: 'Jost', sans-serif;
      --font-body: 'Jost', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--ink);
      overflow: hidden;
    }

    #globe-canvas {
      position: fixed; inset: 0;
      z-index: 1;
      cursor: grab;
      /* Add this line */
      pointer-events: none; 
      transition: opacity 1s ease;
    }
    #globe-canvas:active { cursor: grabbing; }

    /* ── HEADER ── */
    #site-header {
      position: fixed;
      top: 25px; left: 25px;
      z-index: 20;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #site-header.hidden { opacity: 0; }

    #site-title {
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--mist);
      line-height: 1; margin-bottom: 0.45rem;
    }

    #site-tagline {
      font-family: var(--font-body);
      font-size: 0.72rem; font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--sage);
      line-height: 1.6; max-width: 50ch;
      opacity: 0.85;
    }

    /* ── SHUFFLE ── */
    #shuffle-btn {
      position: fixed; top: 25px; right: 70px;
      z-index: 20;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      opacity: 0.55; transition: opacity 0.6s ease; padding: 0;
    }
    #shuffle-btn:hover { opacity: 1; }
    #shuffle-btn.hidden { opacity: 0; pointer-events: none; }
    #shuffle-btn svg { width: 20px; height: 20px; stroke: var(--mist); }

    /* ── SEARCH WRAP ── */
    #search-wrap {
      position: fixed; top: 25px; right: 25px;
      z-index: 20;
      display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
      transition: opacity 0.6s ease;
    }
    #search-wrap.hidden { opacity: 0; pointer-events: none; }

    #search-toggle {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      opacity: 0.55; transition: opacity 0.2s ease; padding: 0; flex-shrink: 0;
    }
    #search-toggle:hover { opacity: 1; }
    #search-toggle.active { opacity: 1; }
    #search-toggle svg {
      width: 20px; height: 20px; stroke: var(--mist);
      fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── SEARCH PANEL ── */
    #search-panel {
      background: rgba(5, 8, 16, 0.88);
      border: 1px solid rgba(122, 158, 142, 0.3);
      border-radius: 8px; width: 260px;
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 0.4s ease, opacity 0.3s ease;
    }
    #search-panel.open { max-height: 400px; opacity: 1; }

    #search-inner { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

    #search-input-row {
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid rgba(122, 158, 142, 0.2);
      padding-bottom: 10px;
    }

    #search-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: var(--font-body); font-size: 0.78rem; font-weight: 300;
      letter-spacing: 0.1em; color: var(--mist); caret-color: var(--sage);
    }
    #search-input::placeholder { color: var(--sage); opacity: 0.5; }

    #search-clear {
      background: none; border: none; cursor: pointer; padding: 0;
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s ease; pointer-events: none; flex-shrink: 0;
    }
    #search-clear.visible { opacity: 0.45; pointer-events: all; }
    #search-clear:hover { opacity: 1; }
    #search-clear svg { width: 12px; height: 12px; stroke: var(--mist); fill: none; stroke-width: 2; stroke-linecap: round; }

    /* ── SEARCH RESULTS ── */
    #search-results { display: flex; flex-direction: column; gap: 4px; }

    .search-status {
      font-family: var(--font-body); font-size: 0.65rem; font-weight: 300;
      letter-spacing: 0.1em; color: var(--sage); opacity: 0.6; padding: 2px 0;
    }

    .search-result-item {
      font-family: var(--font-body); font-size: 0.72rem; font-weight: 300;
      letter-spacing: 0.08em; color: var(--mist);
      padding: 6px 8px; border-radius: 5px; cursor: pointer;
      transition: background 0.15s ease;
      display: flex; align-items: center; gap: 8px;
    }
    .search-result-item:hover { background: rgba(122, 158, 142, 0.12); }
    .search-result-item .result-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--sage); flex-shrink: 0; opacity: 0.7;
    }
    .search-result-item .result-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .search-result-item .result-type {
      font-size: 0.58rem; letter-spacing: 0.12em; color: var(--sage);
      opacity: 0.5; text-transform: lowercase; flex-shrink: 0;
    }

    .search-spinner { display: flex; gap: 5px; padding: 4px 0; }
    .search-spinner span {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--sage);
      animation: blink 1.4s ease-in-out infinite; opacity: 0.4;
    }
    .search-spinner span:nth-child(2) { animation-delay: 0.2s; }
    .search-spinner span:nth-child(3) { animation-delay: 0.4s; }

    /* ── LOADING SCREEN ── */
    #loading {
      position: fixed; 
      inset: 0; 
      z-index: 200;
      background: var(--ink);
      display: flex; 
      align-items: center; 
      justify-content: center;
      flex-direction: column; 
      gap: 0.8rem; 
      transition: opacity 1s ease;
      
      /* Add these two lines */
      pointer-events: all; 
      cursor: default;
      
      user-select: none; 
      -webkit-user-select: none;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #loading-label {
      font-family: var(--font-display); 
      font-size: 1rem; 
      font-weight: 300;
      letter-spacing: 0.18em; 
      color: var(--sage);
      text-align: center;
      padding: 0 2rem;
      max-width: 800px;
      line-height: 1.6;
      /* Maintain height even if text wraps to 2 lines */
      min-height: 3.2rem; 
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The Fixed-Height Anchor */
    .loading-actions {
      height: 64px; 
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .load-dots { display: flex; gap: 7px; }
    .load-dots.hidden { display: none; } /* Hide dots when ready */

    .load-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--sage); animation: blink 1.6s ease-in-out infinite;
    }
    .load-dot:nth-child(2) { animation-delay: 0.25s; }
    .load-dot:nth-child(3) { animation-delay: 0.5s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.15; transform: scale(0.75); }
      40%            { opacity: 1;   transform: scale(1); }
    }

    #btn-enter {
      background: none;
      border: 1px solid var(--sage);
      color: var(--mist);
      padding: 10px 28px;
      font-family: var(--font-display);
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }

    /* Button reveal logic */
    #btn-enter:not(.hidden) {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    #btn-enter:hover {
      background: var(--sage);
      color: var(--ink);
      box-shadow: 0 0 20px var(--glow);
    }

    #btn-enter.hidden {
      display: none;
    }

    #error-msg {
      display: none; font-family: var(--font-body); font-size: 0.72rem;
      color: #a06060; letter-spacing: 0.1em; text-align: center;
      max-width: 30ch; line-height: 1.7; margin-top: 0.5rem;
    }

    /* ── TRAVELING OVERLAY ── */
    #traveling {
      position: fixed; inset: 0; z-index: 90;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1.6rem;
      opacity: 0; pointer-events: none; transition: opacity 0.8s ease;
    }
    #traveling.visible { opacity: 1; pointer-events: all; }

    #traveling-tip {
      font-family: var(--font-display);
      font-size: clamp(0.95rem, 2vw, 1.2rem); font-weight: 300;
      color: var(--mist); letter-spacing: 0.1em; text-align: center;
      max-width: 42ch; line-height: 1.7; opacity: 0.75; padding: 0 2rem;
    }

    /* ── TRANSITION ── */
    #transition {
      position: fixed; inset: 0; z-index: 100;
      background: var(--ink); opacity: 0; pointer-events: none;
      transition: opacity 0.8s ease;
    }
    #transition.visible { opacity: 1; pointer-events: all; }

    /* ── SCENE VIEW ── */
    #scene-view {
      position: fixed; inset: 0; z-index: 2;
      display: none; background: var(--ink); overflow: hidden;
    }
    #scene-view.active { display: block; }

    #yt-blocker { position: absolute; inset: 0; z-index: 5; background: transparent; cursor: default; }

    #scene-vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 35%, rgba(5,8,16,0.3) 68%, rgba(5,8,16,0.72) 100%);
      pointer-events: none; z-index: 6;
    }

    /* ── SCENE HUD ── */
    #scene-hud { position: absolute; inset: 0; z-index: 10; pointer-events: none; transition: opacity 0.6s ease; }
    #scene-hud.hidden { opacity: 0; }

    .hud-btn {
      position: absolute; top: 1.8rem;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; pointer-events: all;
      opacity: 0.55; transition: opacity 0.2s ease;
      background: none; border: none; padding: 0;
    }
    .hud-btn:hover { opacity: 1; }
    #btn-back { top: 1.8rem; left: 1.8rem; }
    #btn-open { top: auto; bottom: 1.8rem; right: 1.8rem; }
    .hud-btn svg { width: 20px; height: 20px; stroke: var(--mist); stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    /* ── TOOLTIP ── */
    #spot-tooltip {
      position: fixed; z-index: 50; pointer-events: none;
      opacity: 0; transition: opacity 0.2s ease;
      transform: translate(18px, -50%);
    }
    #spot-tooltip.visible { opacity: 1; }

    .tooltip-name {
      font-family: var(--font-display);
      font-size: 0.85rem; font-weight: 400;
      letter-spacing: 0.1em; color: var(--mist);
      margin-bottom: 0.35rem;
    }

    .tooltip-quote {
      font-family: var(--font-display);
      font-size: 0.72rem; font-weight: 300;
      letter-spacing: 0.06em; color: var(--mist);
      line-height: 1.6; max-width: 40ch;
      opacity: 0.75;
      white-space: pre-line;
    }

    .tooltip-attribution {
      font-family: var(--font-body);
      font-size: 0.62rem; font-weight: 300;
      font-style: italic; letter-spacing: 0.06em;
      color: var(--sage); opacity: 0.55;
      margin-top: 0.4rem; line-height: 1.5;
    }

    .tooltip-card {
      background: rgba(5, 8, 16, 0.82);
      border: 1px solid rgba(122, 158, 142, 0.18);
      border-radius: 6px;
      padding: 12px 16px;
      backdrop-filter: blur(6px);
    }

    #feedback-trigger {
      position: fixed;
      bottom: 25px; left: 25px;
      z-index: 20;
      font-family: var(--font-body);
      font-size: 0.8rem; font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--sage);
      opacity: 0.7;
      cursor: pointer;
      transition: opacity 0.2s ease;
      background: none;
      border: none;
      padding: 0;
    }
    #feedback-trigger:hover { opacity: 1; }
    #feedback-trigger.hidden { opacity: 0; pointer-events: none; }

    #feedback-modal {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(5, 8, 16, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #feedback-modal.visible {
      opacity: 1;
      pointer-events: all;
    }

    #feedback-modal-inner {
      position: relative;
      width: 420px;
      background: rgba(5, 8, 16, 0.82);
      border: 1px solid rgba(122, 158, 142, 0.18);
      border-radius: 6px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      backdrop-filter: blur(6px);
    }

    #feedback-modal-title {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--mist);
    }

    #feedback-modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.2s ease;
      padding: 0;
    }
    #feedback-modal-close:hover { opacity: 1; }
    #feedback-modal-close svg {
      width: 14px; height: 14px;
      stroke: var(--mist); fill: none;
      stroke-width: 2; stroke-linecap: round;
    }

    #feedback-input {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(122, 158, 142, 0.2);
      border-radius: 4px;
      color: var(--mist);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      line-height: 1.7;
      padding: 12px;
      resize: none;
      height: 120px;
      outline: none;
      caret-color: var(--sage);
    }
    #feedback-input::placeholder { color: var(--sage); opacity: 0.5; }
    #feedback-input:focus { border-color: rgba(122, 158, 142, 0.5); }

    #feedback-submit {
      align-self: flex-end;
      background: none;
      border: 1px solid var(--sage);
      color: var(--mist);
      padding: 8px 24px;
      font-family: var(--font-display);
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    #feedback-submit:hover {
      background: var(--sage);
      color: var(--ink);
    }

    #feedback-status {
      font-family: var(--font-body);
      font-weight: 300;
      color: var(--sage);
      opacity: 0;
      transition: opacity 0.3s ease;
      min-height: 1em;
      text-align: center;
      font-size: 1rem;
      letter-spacing: 0.2em;
    }
    #feedback-status.visible { opacity: 1; }

    /* ── KOFI MODAL ── */
    #kofi-trigger {
      position: fixed;
      bottom: 25px; right: 25px;
      z-index: 20;
      font-family: var(--font-body);
      font-size: 0.8rem; font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--sage);
      opacity: 0.7;
      cursor: pointer;
      transition: opacity 0.2s ease;
      background: none;
      border: none;
      padding: 0;
    }
    #kofi-trigger:hover { opacity: 1; }
    #kofi-trigger.hidden     { opacity: 0; pointer-events: none; }

    #kofi-modal {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(5, 8, 16, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #kofi-modal.visible {
      opacity: 1;
      pointer-events: all;
    }

    #kofi-modal-inner {
      position: relative;
      width: 420px;
      max-height: 80vh;
      overflow-y: auto;
      border-radius: 8px;
      overflow: hidden;
    }

    #kofi-modal-close {
      position: absolute;
      top: 12px; right: 12px;
      z-index: 10;
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.2s ease;
      padding: 0;
      line-height: 1;
    }
    #kofi-modal-close:hover { opacity: 1; }
    #kofi-modal-close svg {
      width: 16px; height: 16px;
      stroke: var(--mist); fill: none;
      stroke-width: 2; stroke-linecap: round;
    }

    #portrait-gate {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--ink);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.2rem;
    }

    #portrait-gate p {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--sage);
      text-align: center;
      line-height: 2;
    }

    @media (pointer: coarse) and (orientation: portrait) {
      #portrait-gate { display: flex; }
    }

    #rotate-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
    }

    #rotate-phone {
      animation: rotate-cue 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      transform-origin: center;
    }

    @keyframes rotate-cue {
      0%   { transform: rotate(0deg);   opacity: 1; }
      40%  { transform: rotate(-90deg); opacity: 1; }
      60%  { transform: rotate(-90deg); opacity: 1; }
      85%  { transform: rotate(0deg);   opacity: 0.4; }
      100% { transform: rotate(0deg);   opacity: 1; }
    }

    #spot-sidebar {
      display: none;
      position: fixed;
      top: 0; right: 0;
      width: 33vw;
      height: 100%;
      z-index: 80;
      background: rgba(5, 8, 16, 0.92);
      border-left: 1px solid rgba(122, 158, 142, 0.15);
      backdrop-filter: blur(8px);
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem 1.5rem 2rem;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @media (pointer: coarse) {
      #spot-sidebar { display: flex; }
    }

    #spot-sidebar.open {
      transform: translateX(0);
    }

    #sidebar-close {
      position: absolute;
      top: 1.2rem; left: 1.2rem;
      background: none; border: none;
      cursor: pointer; padding: 0;
      opacity: 0.5;
      transition: opacity 0.2s ease;
    }
    #sidebar-close:hover { opacity: 1; }
    #sidebar-close svg { width: 12px; height: 12px; }

    #sidebar-content {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      flex: 1;
      justify-content: center;
    }

    #sidebar-name {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--mist);
      line-height: 1.4;
    }

    #sidebar-quote {
      font-family: var(--font-display);
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--mist);
      line-height: 1.7;
      opacity: 0.7;
      white-space: pre-line;
    }

    #sidebar-attribution {
      font-family: var(--font-body);
      font-size: 0.6rem;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.06em;
      color: var(--sage);
      opacity: 0.55;
      line-height: 1.5;
    }

    #sidebar-enter {
      background: none;
      border: 1px solid var(--sage);
      color: var(--mist);
      padding: 10px;
      width: 100%;
      font-family: var(--font-display);
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    #sidebar-enter:hover {
      background: var(--sage);
      color: var(--ink);
    }

    @media (pointer: coarse) {
      #site-title {
        font-size: 1.2rem;
      }

      #site-tagline {
        font-size: 0.62rem;
        max-width: 28ch;
      }
    }
  </style>
</head>
<body>

<div id="portrait-gate">
  <div id="rotate-hint">
    <svg id="rotate-phone" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#7a9e8e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="7" y="2" width="10" height="18" rx="2"/>
      <path d="M12 17h.01"/>
    </svg>
  </div>
  <p>rotate to landscape<br>to enter</p>
</div>

<div id="site-header">
  <p id="site-title">iKnowASpot</p>
  <p id="site-tagline">Curated natural soundscapes for<br>focus, calm, and connection to place.</p>
</div>

<button id="shuffle-btn" aria-label="Shuffle to a random spot">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/>
    <path d="M15 15l6 6"/><path d="M4 4l5 5"/>
  </svg>
</button>

<div id="search-wrap">
  <button id="search-toggle" aria-label="Search spots">
    <svg viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
  </button>
  <div id="search-panel">

    <iframe src='https://ko-fi.com/evanehodson/?hidefeed=true&widget=true&embed=true&preview=true' 
      style='border:none;width:100%;padding:4px;background:#f9f9f9;' 
      height='712' 
      title='Support iKnowASpot on Ko-fi'>
    </iframe>
  </div>

<script>
  const $kofiTrigger = document.getElementById('kofi-trigger');
  const $kofiModal   = document.getElementById('kofi-modal');
  const $kofiClose   = document.getElementById('kofi-modal-close');

  $kofiTrigger.addEventListener('click', () => $kofiModal.classList.add('visible'));
  $kofiClose.addEventListener('click',   () => $kofiModal.classList.remove('visible'));
  $kofiModal.addEventListener('click', e => {
    if (e.target === $kofiModal) $kofiModal.classList.remove('visible');
  });
</script>
