<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iKnowASpot</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Karla:wght@300;400&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0a0f0d;
      --sage: #7a9e8e;
      --mist: #c8d8c0;
      --cream: #e8e4d4;
      --glow: rgba(120, 180, 140, 0.6);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Karla', sans-serif;
    }

    /* ── MAP VIEW ── */
    #map-view {
      position: fixed; inset: 0;
      z-index: 1;
      transition: opacity 0.6s ease;
    }

    #map {
      width: 100%; height: 100%;
    }

    /* ── MARKERS ── */
    .spot-marker {
      width: 14px; height: 14px;
      cursor: pointer;
      position: relative;
    }

    .spot-marker::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%;
      background: var(--sage);
      animation: pulse 3s ease-out infinite;
    }

    .spot-marker::after {
      content: '';
      position: absolute; inset: 3px;
      border-radius: 50%;
      background: var(--mist);
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 var(--glow); }
      70%  { box-shadow: 0 0 0 12px rgba(120,180,140,0); }
      100% { box-shadow: 0 0 0 0 rgba(120,180,140,0); }
    }

    .spot-label {
      position: absolute;
      left: 20px; top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 300;
      font-style: italic;
      color: var(--mist);
      letter-spacing: 0.05em;
      pointer-events: none;
      text-shadow: 0 1px 10px rgba(10,15,13,0.95);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .spot-marker:hover .spot-label { opacity: 1; }

    /* ── LOADING STATE ── */
    #loading {
      position: fixed; inset: 0;
      z-index: 200;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      transition: opacity 0.6s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading p {
      font-family: var(--font-display);
      font-size: 1rem;
      font-style: italic;
      color: var(--sage);
      letter-spacing: 0.1em;
    }

    .load-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--sage);
      animation: blink 1.4s ease-in-out infinite;
    }
    .load-dot:nth-child(2) { animation-delay: 0.2s; }
    .load-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1); }
    }

    #error-msg {
      display: none;
      font-family: var(--font-body);
      font-size: 0.75rem;
      color: #a06060;
      letter-spacing: 0.1em;
      text-align: center;
      max-width: 32ch;
      line-height: 1.6;
    }

    /* ── TRANSITION OVERLAY ── */
    #transition {
      position: fixed; inset: 0;
      z-index: 100;
      background: var(--ink);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.75s ease;
    }

    #transition.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* ── SCENE VIEW ── */
    #scene-view {
      position: fixed; inset: 0;
      z-index: 2;
      display: none;
      background: var(--ink);
      overflow: hidden;
    }

    #scene-view.active { display: block; }

    #scene-view iframe {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: max(177.78vh, 100vw);
      height: max(100vh, 56.25vw);
      border: none;
      z-index: 1;
    }

    #scene-vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 35%,
        rgba(10,15,13,0.35) 68%,
        rgba(10,15,13,0.78) 100%);
      pointer-events: none;
      z-index: 3;
    }

    /* ── BACK BUTTON ── */
    #btn-back {
      position: absolute;
      top: 2rem; left: 2rem;
      z-index: 10;
      width: 44px; height: 44px;
      background: rgba(10,15,13,0.45);
      border: 1px solid rgba(120,180,140,0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease, border-color 0.25s ease, background 0.25s ease;
    }

    #btn-back:hover {
      border-color: rgba(120,180,140,0.5);
      background: rgba(45,74,62,0.55);
    }

    #btn-back svg {
      width: 18px; height: 18px;
      stroke: var(--mist);
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #btn-back.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* MapLibre attribution */
    .maplibregl-ctrl-bottom-right { opacity: 0.25; }
    .maplibregl-ctrl-attrib {
      background: transparent !important;
      font-size: 0.52rem !important;
    }
  </style>
</head>
<body>

<!-- INITIAL LOAD SCREEN -->
<div id="loading">
  <p>finding your spots</p>
  <div style="display:flex;gap:6px">
    <span class="load-dot"></span>
    <span class="load-dot"></span>
    <span class="load-dot"></span>
  </div>
  <p id="error-msg"></p>
</div>

<!-- MAP VIEW -->
<div id="map-view">
  <div id="map"></div>
</div>

<!-- FADE TO BLACK -->
<div id="transition"></div>

<!-- SCENE VIEW -->
<div id="scene-view">
  <div id="scene-vignette"></div>
  <button id="btn-back" class="hidden" aria-label="Return to map">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let SPOTS = [];
let ytApiReady = false;
let ytPlayer = null;
let idleTimer = null;

const $loading    = document.getElementById('loading');
const $transition = document.getElementById('transition');
const $mapView    = document.getElementById('map-view');
const $sceneView  = document.getElementById('scene-view');
const $btnBack    = document.getElementById('btn-back');
const $errorMsg   = document.getElementById('error-msg');

// ── YOUTUBE API ───────────────────────────────────────────────────────────────
window.onYouTubeIframeAPIReady = () => { ytApiReady = true; };

// ── LOAD SPOTS (PURE JSON) ───────────────────────────────────────────────────
async function loadSpots() {
  const res = await fetch('./spots.json');

  if (!res.ok) {
    throw new Error(`Failed to load spots.json: ${res.status}`);
  }

  const data = await res.json();

  return data.map(s => ({
    name: s.name || 'Unnamed Spot',
    lat: parseFloat(s.lat),
    lng: parseFloat(s.lng),
    videoId: s.videoId
  }));
}

// ── MAP ───────────────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      esri: {
        type: "raster",
        tiles: [
          "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        ],
        tileSize: 256,
        attribution: "Esri"
      }
    },
    layers: [
      {
        id: "esri-layer",
        type: "raster",
        source: "esri"
      }
    ]
  },
  center: [-96, 40],
  zoom: 3.8,
  minZoom: 2,
  maxZoom: 14,
  attributionControl: false
});

map.addControl(
  new maplibregl.AttributionControl({ compact: true }),
  'bottom-right'
);

map.scrollZoom.disable();

function addMarkersToMap() {
  SPOTS.forEach((spot, i) => {
    const el = document.createElement('div');
    el.className = 'spot-marker';

    const label = document.createElement('span');
    label.className = 'spot-label';
    label.textContent = spot.name;
    el.appendChild(label);

    el.addEventListener('click', () => enterSpot(i));

    new maplibregl.Marker({ element: el, anchor: 'center' })
      .setLngLat([spot.lng, spot.lat])
      .addTo(map);
  });
}

map.on('load', () => {
  [
    'road-label','road-number-shield','poi-label',
    'airport-label','transit-label','waterway-label',
    'natural-line-label','natural-point-label',
    'place-suburb','place-city','place-town',
    'place-village','place-neighbourhood',
    'country-label','state-label'
  ].forEach(id => {
    if (map.getLayer(id)) {
      map.setLayoutProperty(id, 'visibility', 'none');
    }
  });
});

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    SPOTS = await loadSpots();

    if (!SPOTS.length) {
      throw new Error('No spots found in spots.json');
    }

    if (map.isStyleLoaded()) {
      addMarkersToMap();
    } else {
      map.once('load', addMarkersToMap);
    }

    $loading.classList.add('hidden');

  } catch (err) {
    console.error(err);

    $errorMsg.style.display = 'block';
    $errorMsg.textContent = `Could not load spots.\n${err.message}`;

    document.querySelector('#loading div').style.display = 'none';
  }
}

init();

// ── ENTER SPOT ────────────────────────────────────────────────────────────────
function enterSpot(index) {
  const spot = SPOTS[index];

  fadeToBlack(() => {
    $mapView.style.opacity = '0';
    $mapView.style.pointerEvents = 'none';
    $sceneView.classList.add('active');

    const launch = () => {
      let revealed = false;

      function reveal() {
        if (revealed) return;
        revealed = true;

        fadeFromBlack();

        setTimeout(() => {
          $btnBack.classList.remove('hidden');
          resetIdleTimer();
          document.addEventListener('mousemove', resetIdleTimer);
        }, 800);
      }

      destroyPlayer();

      const target = document.createElement('div');
      target.id = 'yt-target';
      $sceneView.insertBefore(
        target,
        document.getElementById('scene-vignette')
      );

      ytPlayer = new YT.Player('yt-target', {
        videoId: spot.videoId,
        playerVars: {
          autoplay: 1,
          mute: 0,
          loop: 1,
          playlist: spot.videoId,
          controls: 1,
          modestbranding: 1,
          playsinline: 1,
          rel: 0,
          iv_load_policy: 3
        },
        events: {
          onReady(e) {
            e.target.playVideo();
          },
          onStateChange(e) {
            if (e.data === YT.PlayerState.PLAYING) reveal();
          },
          onError() {
            reveal();
          }
        }
      });

      const sizeInterval = setInterval(() => {
        const el = document.getElementById('yt-target');
        if (el && el.tagName === 'IFRAME') {
          el.style.cssText = `
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            width:max(177.78vh,100vw);
            height:max(100vh,56.25vw);
            border:none;
            z-index:1;
          `;
          clearInterval(sizeInterval);
        }
      }, 30);

      setTimeout(reveal, 5000);
    };

    if (ytApiReady) launch();
    else {
      const poll = setInterval(() => {
        if (ytApiReady) {
          clearInterval(poll);
          launch();
        }
      }, 100);
    }
  });
}

// ── RETURN ───────────────────────────────────────────────────────────────────
function returnToMap() {
  fadeToBlack(() => {
    destroyPlayer();

    $sceneView.classList.remove('active');

    $btnBack.classList.add('hidden');
    clearTimeout(idleTimer);
    document.removeEventListener('mousemove', resetIdleTimer);

    $mapView.style.opacity = '1';
    $mapView.style.pointerEvents = 'auto';

    fadeFromBlack();
  });
}

$btnBack.addEventListener('click', returnToMap);

// ── PLAYER CLEANUP ────────────────────────────────────────────────────────────
function destroyPlayer() {
  if (ytPlayer) {
    try { ytPlayer.destroy(); } catch(e) {}
    ytPlayer = null;
  }

  const old = document.getElementById('yt-target');
  if (old) old.remove();
}

// ── TRANSITIONS ───────────────────────────────────────────────────────────────
function fadeToBlack(cb) {
  $transition.classList.add('visible');
  setTimeout(cb, 800);
}

function fadeFromBlack() {
  setTimeout(() => {
    $transition.classList.remove('visible');
  }, 60);
}

// ── IDLE UI ───────────────────────────────────────────────────────────────────
function resetIdleTimer() {
  $btnBack.classList.remove('hidden');

  clearTimeout(idleTimer);

  idleTimer = setTimeout(() => {
    $btnBack.classList.add('hidden');
  }, 3500);
}
</script>
</body>
</html>
